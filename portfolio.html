<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body class="bg-slate-900 text-white font-sans antialiased h-screen flex flex-col items-center justify-center text-center p-6">

  <div class="max-w-md w-full space-y-8">
    <!-- Visual Element -->
    <div class="relative w-20 h-20 mx-auto">
      <div class="absolute inset-0 bg-blue-600 rounded-full animate-ping opacity-25"></div>
      <div class="relative w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center shadow-lg">
        <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>

    <div class="space-y-4">

      </p>
    </div>

    <!-- Fallback -->
    <div class="pt-6">
      <a href="work.html" class="inline-flex items-center gap-2 text-sm font-bold uppercase tracking-widest text-slate-500 hover:text-white transition group">
        Click here if not redirected 
        <svg class="w-4 h-4 group-hover:translate-x-1 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7-7 7"></path></svg>
      </a>
    </div>
  </div>

  <!-- Progress Bar -->
  <div class="fixed bottom-0 left-0 h-1 bg-blue-600 transition-all duration-3000 ease-linear w-0" style="animation: progress 3s linear forwards;"></div>

  <style>
    @keyframes progress {
      from { width: 0%; }
      to { width: 100%; }
    }
  </style>

  <script src="./js/global.min.js"></script>
